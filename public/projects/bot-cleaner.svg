<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Bot Cleaner placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0840"/>
      <stop offset="1" stop-color="#3b0a5e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>
  <g opacity="0.25" stroke="#5ce1ff" stroke-width="0.6">
    <line x1="0" y1="50" x2="320" y2="50"/>
    <line x1="0" y1="100" x2="320" y2="100"/>
    <line x1="0" y1="150" x2="320" y2="150"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
  </g>
  <!-- Discord-ish chat bubbles being swept -->
  <g opacity="0.35">
    <rect x="20" y="40" width="70" height="14" rx="6" fill="#5865F2"/>
    <rect x="20" y="60" width="50" height="14" rx="6" fill="#ff2bd6"/>
    <rect x="20" y="80" width="80" height="14" rx="6" fill="#5865F2"/>
  </g>
  <!-- Broom sweep arc -->
  <path d="M120 140 Q200 60 300 100" fill="none" stroke="#5ce1ff" stroke-width="1.4" stroke-dasharray="4 4" opacity="0.7"/>
  <!-- Robot janitor (placeholder Wall-E vibe) -->
  <g transform="translate(170,80)">
    <!-- Treads -->
    <rect x="-32" y="56" width="64" height="14" rx="3" fill="#0c0420" stroke="#ffd166"/>
    <circle cx="-22" cy="63" r="4" fill="#ffd166"/>
    <circle cx="-8"  cy="63" r="4" fill="#ffd166"/>
    <circle cx="8"   cy="63" r="4" fill="#ffd166"/>
    <circle cx="22"  cy="63" r="4" fill="#ffd166"/>
    <!-- Body -->
    <rect x="-26" y="14" width="52" height="42" rx="4" fill="#ffd166" stroke="#ff8c42" stroke-width="1.5"/>
    <rect x="-22" y="22" width="44" height="6" fill="#ff8c42" opacity="0.4"/>
    <rect x="-22" y="34" width="44" height="6" fill="#ff8c42" opacity="0.4"/>
    <rect x="-22" y="46" width="44" height="6" fill="#ff8c42" opacity="0.4"/>
    <!-- Neck -->
    <rect x="-4" y="6" width="8" height="10" fill="#ffd166"/>
    <!-- Head with binocular eyes -->
    <rect x="-22" y="-12" width="44" height="18" rx="4" fill="#0c0420" stroke="#ffd166" stroke-width="1.5"/>
    <circle cx="-10" cy="-3" r="6" fill="#5ce1ff"/>
    <circle cx="10"  cy="-3" r="6" fill="#5ce1ff"/>
    <circle cx="-10" cy="-3" r="2" fill="#0c0420"/>
    <circle cx="10"  cy="-3" r="2" fill="#0c0420"/>
  </g>
  <!-- Label -->
  <rect x="10" y="10" width="110" height="20" fill="rgba(10,4,32,0.7)" stroke="#ff2bd6"/>
  <text x="18" y="24" font-family="Orbitron, sans-serif" font-size="10" fill="#5ce1ff" letter-spacing="2">DISCORD · CLEANUP</text>
  <text x="160" y="194" text-anchor="middle" font-family="Orbitron, sans-serif" font-size="7" fill="#ffffff66" letter-spacing="2">PLACEHOLDER — DROP WALL-E PNG AT /projects/bot-cleaner.png</text>
</svg>
