<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="2D Action Platformer (Unreal Engine 5)">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0840"/>
      <stop offset="1" stop-color="#3b0a5e"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="0.55" stop-color="#ff6ec7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff2bd6"/>
      <stop offset="1" stop-color="#0c0420"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="160" cy="118" r="52" fill="url(#sun)"/>
  <!-- Sun bars -->
  <g fill="#1a0840">
    <rect x="108" y="108" width="104" height="3"/>
    <rect x="108" y="116" width="104" height="3"/>
    <rect x="108" y="124" width="104" height="3"/>
    <rect x="108" y="132" width="104" height="3"/>
  </g>
  <!-- Distant mountains -->
  <path d="M0 150 L60 110 L100 140 L160 95 L220 135 L270 105 L320 145 L320 200 L0 200 Z" fill="#1a0840" opacity="0.85"/>
  <!-- Ground grid -->
  <rect x="0" y="150" width="320" height="50" fill="url(#ground)" opacity="0.6"/>
  <g stroke="#5ce1ff" stroke-width="0.6" opacity="0.75">
    <line x1="0" y1="155" x2="320" y2="155"/>
    <line x1="0" y1="165" x2="320" y2="165"/>
    <line x1="0" y1="180" x2="320" y2="180"/>
    <line x1="0" y1="200" x2="320" y2="200"/>
    <line x1="0" y1="150" x2="60" y2="200"/>
    <line x1="40" y1="150" x2="100" y2="200"/>
    <line x1="80" y1="150" x2="140" y2="200"/>
    <line x1="120" y1="150" x2="180" y2="200"/>
    <line x1="160" y1="150" x2="220" y2="200"/>
    <line x1="200" y1="150" x2="260" y2="200"/>
    <line x1="240" y1="150" x2="300" y2="200"/>
    <line x1="280" y1="150" x2="340" y2="200"/>
  </g>
  <!-- Platform tiles -->
  <g fill="#0c0420" stroke="#5ce1ff" stroke-width="1">
    <rect x="40" y="135" width="40" height="12"/>
    <rect x="200" y="115" width="50" height="12"/>
    <rect x="265" y="90" width="40" height="12"/>
  </g>
  <!-- Hero (megaman-ish blocky silhouette) -->
  <g transform="translate(54,108)">
    <rect x="0" y="0" width="14" height="14" fill="#5ce1ff"/>
    <rect x="2" y="14" width="10" height="10" fill="#0a8fb8"/>
    <rect x="-2" y="6" width="4" height="8" fill="#0a8fb8"/>
    <rect x="12" y="6" width="4" height="8" fill="#ff2bd6"/>
    <rect x="2" y="3" width="3" height="3" fill="#0c0420"/>
    <rect x="9" y="3" width="3" height="3" fill="#0c0420"/>
  </g>
  <!-- Coin -->
  <circle cx="285" cy="80" r="5" fill="#ffd166" stroke="#fff" stroke-width="0.6"/>
  <!-- Title plate -->
  <rect x="10" y="10" width="98" height="20" fill="rgba(10,4,32,0.7)" stroke="#ff2bd6"/>
  <text x="18" y="24" font-family="Orbitron, sans-serif" font-size="11" fill="#5ce1ff" letter-spacing="2">UE5 · 2D</text>
</svg>
